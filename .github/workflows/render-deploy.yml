name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL não configurado — adicione o Deploy Hook do Render em Settings > Secrets."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Deploy no Render disparado."
