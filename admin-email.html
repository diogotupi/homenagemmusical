<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envio de Entrega | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #b94f37;
            --primary-hover: #a34530;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #16120f;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --success: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend Deca', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-send:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-send:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .status-success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-links {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .nav-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="header">
            <h1>Notificação de Entrega</h1>
            <p>Envie o link da homenagem para o cliente</p>
        </div>

        <form id="emailForm">
            <div class="form-group">
                <label for="email">E-mail do Cliente</label>
                <input type="email" id="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="form-group">
                <label for="deliveryLink">Link da Entrega</label>
                <input type="url" id="deliveryLink" placeholder="https://hmusical.com.br/entregas/..." required>
            </div>

            <button type="submit" class="btn-send" id="btnSubmit">
                <span>Enviar E-mail</span>
            </button>
        </form>

        <div id="statusMessage" class="status-message"></div>

        <div class="nav-links">
            <a href="admin-entrega.html">← Voltar para Gerador de Entrega</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('emailForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const deliveryLink = document.getElementById('deliveryLink').value;

            // Reset status
            statusMessage.style.display = 'none';
            statusMessage.className = 'status-message';
            
            // Set loading state
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="loader"></span> Enviando...';

            try {
                const response = await fetch('/api/send-delivery-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, deliveryLink })
                });

                const data = await response.json();

                if (response.ok) {
                    statusMessage.textContent = 'E-mail enviado com sucesso! 🎉';
                    statusMessage.classList.add('status-success');
                    form.reset();
                } else {
                    throw new Error(data.error || 'Erro ao enviar e-mail');
                }
            } catch (error) {
                statusMessage.textContent = 'Erro: ' + error.message;
                statusMessage.classList.add('status-error');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<span>Enviar E-mail</span>';
                statusMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
