<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description"
    content="Crie sua música personalizada em minutos com IA. Ouça a prévia grátis e faça o download das duas versões em MP3." />
  <title>História Musical | Geração instantânea</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://use.typekit.net/xva0ahr.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="landing-page">
  <header class="site-header site-header--minimal">
    <a class="brand" href="#inicio" aria-label="História Musical">
      <span class="brand-mark">♪</span>
      <span>História Musical</span>
    </a>
  </header>

  <main class="landing-shell" id="inicio">
    <header class="landing-hero">
      <h1 class="landing-hero__title">Veja sua história <span>virar música</span></h1>
    </header>

    <section class="landing-tool music-playground music-playground--landing" id="gerador-instantaneo"
      aria-label="Gerador de música">
      <div class="music-playground__wrap">
        <div class="landing-card music-playground__card">
          <form id="aiGeneratorForm" class="music-playground__form landing-form">
            <div class="landing-form__field">
              <label for="promptHistoria">Sua história</label>
              <textarea id="promptHistoria" name="historia" maxlength="420" rows="4" required spellcheck="true"
                placeholder="Ex.: Dona Maria e José, 42 anos juntos, lasanha de domingo com os netos, muito amor na família…"></textarea>
            </div>
            <div class="landing-form__field">
              <label for="promptEstilo">Estilo musical</label>
              <input type="text" id="promptEstilo" name="estilo" maxlength="120" required spellcheck="true"
                placeholder="Ex.: sertanejo romântico moderno, vocal feminino, emocionante" />
            </div>
            <button type="submit" class="button primary music-playground__submit" id="btnGerarIA">GERAR GRÁTIS</button>
          </form>
        </div>

        <div id="aiLoading" class="music-playground__loading" hidden role="status" aria-live="polite">
          <div class="music-playground__spinner" aria-hidden="true"></div>
          <div class="music-playground__loading-copy">
            <p>Produzindo sua música…</p>
            <p class="music-playground__loading-warn"><strong>Não feche esta página.</strong></p>
          </div>
        </div>

        <div id="aiResultArea" class="music-playground__result" style="display: none;">
          <p id="dualPreviewSubtitle" class="music-playground__result-note"></p>

          <div class="dual-preview" id="dualPreviewGrid">
            <div class="dual-preview__col">
              <article class="modern-player-card modern-player-card--a" id="wrapPlayerV1">
                <div class="modern-player-card__ribbon">
                  <span class="preview-badge">Preview 50%</span>
                  <span class="modern-player-card__badge-label">Versão 1</span>
                </div>
                <h3 class="modern-player-card__title" id="aiSongTitleV1"></h3>
                <audio id="aiPreviewAudioV1" src="" preload="metadata" playsinline controlsList="nodownload"></audio>
                <div class="modern-player-card__row">
                  <button type="button" id="btnPlayIAV1" class="modern-player-card__play" aria-label="Tocar ou pausar versão 1">▶</button>
                  <div class="modern-player-card__seek" data-player="v1" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Linha do tempo versão 1">
                    <div class="modern-player-card__seek-bg"></div>
                    <div class="modern-player-card__seek-fill progress-bar-ia" data-player="v1"></div>
                  </div>
                </div>
              </article>
            </div>
            <div class="dual-preview__col">
              <article class="modern-player-card modern-player-card--b modern-player-card--v2" id="wrapPlayerV2">
                <div class="modern-player-card__ribbon">
                  <span class="preview-badge">Preview 50%</span>
                  <span class="modern-player-card__badge-label">Versão 2</span>
                </div>
                <h3 class="modern-player-card__title" id="aiSongTitleV2"></h3>
                <audio id="aiPreviewAudioV2" src="" preload="metadata" playsinline controlsList="nodownload"></audio>
                <div class="modern-player-card__row">
                  <button type="button" id="btnPlayIAV2" class="modern-player-card__play" aria-label="Tocar ou pausar versão 2">▶</button>
                  <div class="modern-player-card__seek" data-player="v2" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Linha do tempo versão 2">
                    <div class="modern-player-card__seek-bg"></div>
                    <div class="modern-player-card__seek-fill progress-bar-ia" data-player="v2"></div>
                  </div>
                </div>
              </article>
            </div>
          </div>

          <button class="music-playground__cta music-playground__buy" id="btnComprarIA" type="button">
            <span class="music-playground__cta-main">Fazer o download</span>
            <span class="music-playground__cta-sub">Das duas versões em MP3 · <strong>R$ 19,00</strong></span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer footer--landing">
    <div class="footer__col">
      <span>História Musical</span>
      <a href="termos.html" class="footer__link">Termos e Condições</a>
      <p class="footer__cnpj">História Musical CNPJ: 38.234.287/0001-97</p>
    </div>
    <span>Feito com amor ❤️</span>
  </footer>

  <script>
    (function () {
      const aiForm = document.getElementById('aiGeneratorForm');
      const aiLoading = document.getElementById('aiLoading');
      const aiResult = document.getElementById('aiResultArea');
      const historiaEl = document.getElementById('promptHistoria');
      const estiloEl = document.getElementById('promptEstilo');
      const btnComprar = document.getElementById('btnComprarIA');

      function buildDescricaoPayload() {
        const historia = historiaEl.value.trim();
        const estilo = estiloEl.value.trim();
        return { historia, estilo };
      }

      const wrapV1 = document.getElementById('wrapPlayerV1');
      const wrapV2 = document.getElementById('wrapPlayerV2');

      const players = [
        {
          key: 'v1',
          audio: document.getElementById('aiPreviewAudioV1'),
          btn: document.getElementById('btnPlayIAV1'),
          bar: wrapV1 && wrapV1.querySelector('.progress-bar-ia[data-player="v1"]'),
          seek: wrapV1 && wrapV1.querySelector('.modern-player-card__seek[data-player="v1"]'),
          wrap: wrapV1,
          titleEl: document.getElementById('aiSongTitleV1'),
        },
        {
          key: 'v2',
          audio: document.getElementById('aiPreviewAudioV2'),
          btn: document.getElementById('btnPlayIAV2'),
          bar: wrapV2 && wrapV2.querySelector('.progress-bar-ia[data-player="v2"]'),
          seek: wrapV2 && wrapV2.querySelector('.modern-player-card__seek[data-player="v2"]'),
          wrap: wrapV2,
          titleEl: document.getElementById('aiSongTitleV2'),
        },
      ].filter((p) => p.audio && p.btn && p.bar && p.seek && p.wrap);

      let currentSong = null;
      const PREVIEW_HALF = 0.5;
      const previewEnds = { v1: Infinity, v2: Infinity };
      let draggingSeek = null;

      function setBuyCta(twoVers) {
        btnComprar.innerHTML = twoVers
          ? `<span class="music-playground__cta-main">Fazer o download</span><span class="music-playground__cta-sub">Das duas versões em MP3 · <strong>R$ 19,00</strong></span>`
          : `<span class="music-playground__cta-main">Fazer o download</span><span class="music-playground__cta-sub">MP3 completo · <strong>R$ 19,00</strong></span>`;
      }

      setBuyCta(true);

      function clampSeekTime(audio, previewEnd, t) {
        if (!Number.isFinite(previewEnd) || previewEnd <= 0) return;
        audio.currentTime = Math.max(0, Math.min(t, previewEnd));
      }

      function seekFromPointer(seekEl, audio, previewEnd, clientX) {
        const rect = seekEl.getBoundingClientRect();
        if (rect.width <= 0 || !Number.isFinite(previewEnd) || previewEnd <= 0) return;
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        audio.currentTime = ratio * previewEnd;
      }

      function resetPreviews() {
        players.forEach((p, i) => {
          const key = i === 0 ? 'v1' : 'v2';
          previewEnds[key] = Infinity;
          p.bar.style.width = '0%';
          p.seek.setAttribute('aria-valuenow', '0');
          p.seek.classList.remove('modern-player-card__seek--active');
          if (p.titleEl) p.titleEl.textContent = '';
        });
      }

      function bindHalfPreview(spec) {
        const keyLabel = spec.key;
        const { audio, btn, bar, seek } = spec;

        audio.addEventListener('play', () => {
          players.forEach((p) => {
            if (p === spec) return;
            if (!p.audio.paused) {
              p.audio.pause();
              p.btn.textContent = '▶';
            }
          });
        });

        btn.onclick = () => {
          if (audio.paused) {
            if (Number.isFinite(previewEnds[keyLabel]) && audio.currentTime >= previewEnds[keyLabel] - 0.08) {
              audio.currentTime = 0;
            }
            audio.play().catch(() => {});
            btn.textContent = '⏸';
          } else {
            audio.pause();
            btn.textContent = '▶';
          }
        };

        audio.onseeking = () => {
          if (Number.isFinite(previewEnds[keyLabel]) && audio.currentTime > previewEnds[keyLabel]) {
            audio.currentTime = previewEnds[keyLabel];
          }
        };

        audio.ontimeupdate = () => {
          if (Number.isFinite(previewEnds[keyLabel]) && audio.currentTime >= previewEnds[keyLabel] - 0.06) {
            audio.pause();
            audio.currentTime = previewEnds[keyLabel];
            btn.textContent = '▶';
          }
          const denom =
            Number.isFinite(previewEnds[keyLabel]) && previewEnds[keyLabel] > 0
              ? previewEnds[keyLabel]
              : audio.duration || 1;
          const percent = Math.min(100, (audio.currentTime / denom) * 100);
          bar.style.width = percent + '%';
          seek.setAttribute('aria-valuenow', String(Math.round(percent)));
        };

        audio.onended = () => {
          btn.textContent = '▶';
          bar.style.width =
            Number.isFinite(previewEnds[keyLabel]) && previewEnds[keyLabel] > 0 ? '100%' : '0%';
        };

        seek.addEventListener('mousedown', (ev) => {
          if (!Number.isFinite(previewEnds[keyLabel]) || previewEnds[keyLabel] <= 0) return;
          ev.preventDefault();
          draggingSeek = { audio, seek, bar, btn, key: keyLabel };
          seek.classList.add('modern-player-card__seek--dragging');
          seek.classList.add('modern-player-card__seek--active');
          seekFromPointer(seek, audio, previewEnds[keyLabel], ev.clientX);
        });

        seek.addEventListener(
          'touchstart',
          (ev) => {
            if (!Number.isFinite(previewEnds[keyLabel]) || previewEnds[keyLabel] <= 0) return;
            if (!ev.touches.length) return;
            ev.preventDefault();
            draggingSeek = { audio, seek, bar, btn, key: keyLabel };
            seek.classList.add('modern-player-card__seek--dragging');
            seekFromPointer(seek, audio, previewEnds[keyLabel], ev.touches[0].clientX);
          },
          { passive: false },
        );

        seek.addEventListener(
          'touchmove',
          (ev) => {
            if (draggingSeek?.seek !== seek || !ev.touches.length) return;
            ev.preventDefault();
            const px = previewEnds[keyLabel];
            if (!Number.isFinite(px) || px <= 0) return;
            seekFromPointer(seek, audio, px, ev.touches[0].clientX);
            btn.textContent = audio.paused ? '▶' : '⏸';
          },
          { passive: false },
        );

        const endSeekTouch = () => {
          if (draggingSeek?.seek === seek) {
            seek.classList.remove('modern-player-card__seek--dragging');
            seek.classList.remove('modern-player-card__seek--active');
            draggingSeek = null;
          }
        };
        seek.addEventListener('touchend', endSeekTouch);
        seek.addEventListener('touchcancel', endSeekTouch);

        seek.addEventListener('keydown', (ev) => {
          const dur = previewEnds[keyLabel];
          if (!Number.isFinite(dur) || dur <= 0) return;
          const jump = dur * 0.05;
          if (ev.key === 'ArrowLeft' || ev.key === 'ArrowDown') {
            ev.preventDefault();
            clampSeekTime(audio, dur, audio.currentTime - jump);
          } else if (ev.key === 'ArrowRight' || ev.key === 'ArrowUp') {
            ev.preventDefault();
            clampSeekTime(audio, dur, audio.currentTime + jump);
          } else if (ev.key === 'Home') {
            ev.preventDefault();
            audio.currentTime = 0;
          } else if (ev.key === 'End') {
            ev.preventDefault();
            audio.currentTime = dur;
          }
        });
      }

      document.addEventListener('mouseup', () => {
        if (draggingSeek) {
          draggingSeek.seek.classList.remove('modern-player-card__seek--dragging');
          draggingSeek.seek.classList.remove('modern-player-card__seek--active');
          draggingSeek = null;
        }
      });

      document.addEventListener('mousemove', (ev) => {
        if (!draggingSeek) return;
        const { audio, seek, btn, key } = draggingSeek;
        const px = previewEnds[key];
        if (!Number.isFinite(px) || px <= 0) return;
        seekFromPointer(seek, audio, px, ev.clientX);
        btn.textContent = audio.paused ? '▶' : '⏸';
      });

      document.addEventListener(
        'touchmove',
        (ev) => {
          if (!draggingSeek || !ev.touches.length) return;
          ev.preventDefault();
          const { audio, seek, btn } = draggingSeek;
          const px = previewEnds[draggingSeek.key];
          if (!Number.isFinite(px) || px <= 0) return;
          seekFromPointer(seek, audio, px, ev.touches[0].clientX);
          btn.textContent = audio.paused ? '▶' : '⏸';
        },
        { passive: false, capture: true },
      );

      document.addEventListener('touchend', () => {
        if (draggingSeek) {
          draggingSeek.seek.classList.remove('modern-player-card__seek--dragging');
          draggingSeek.seek.classList.remove('modern-player-card__seek--active');
          draggingSeek = null;
        }
      });

      players.forEach(bindHalfPreview);

      aiForm.onsubmit = async (e) => {
        e.preventDefault();
        resetPreviews();
        const payload = buildDescricaoPayload();

        aiLoading.hidden = false;
        aiResult.style.display = 'none';

        try {
          const response = await fetch('/api/generate-instant-song', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            currentSong = data;
            const list = Array.isArray(data.tracks) ? data.tracks : [];
            const dualGrid = document.getElementById('dualPreviewGrid');
            if (dualGrid) dualGrid.classList.toggle('dual-preview--single', list.length < 2);
            setBuyCta(list.length > 1);

            const tit = data.title ? String(data.title).trim() : '';
            document.getElementById('dualPreviewSubtitle').textContent =
              list.length > 1
                ? tit
                  ? `Duas versões de «${tit}». Ouça até metade de cada prévia.`
                  : 'Duas versões criadas. Ouça até metade de cada prévia.'
                : tit
                  ? `«${tit}» — ouça até metade da prévia.`
                  : 'Ouça até metade da prévia.';

            players.forEach((spec, idx) => {
              const slot = list[idx];
              spec.wrap.style.display = slot ? '' : 'none';
              spec.wrap.closest('.dual-preview__col').style.display = slot ? '' : 'none';
              if (!slot) return;
              spec.audio.src = slot.previewUrl || '';
              spec.audio.onloadedmetadata = () => {
                const k = idx === 0 ? 'v1' : 'v2';
                previewEnds[k] = Number.isFinite(spec.audio.duration)
                  ? spec.audio.duration * PREVIEW_HALF
                  : Infinity;
              };
              if (spec.titleEl) spec.titleEl.textContent = slot.title ? String(slot.title) : '';
            });

            aiLoading.hidden = true;
            aiResult.style.display = 'block';
            document.body.classList.add('landing-page--has-result');
            aiResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            localStorage.setItem(
              'lastGeneratedSong',
              JSON.stringify({
                songId: data.songId,
                title: data.title,
                tracks: (data.tracks || []).map((t) => ({
                  label: t.label,
                  title: t.title,
                  previewUrl: t.previewUrl,
                })),
              }),
            );
          } else if (response.status === 429) {
            aiLoading.hidden = true;
            alert((data.error || 'Limite de testes gratuitos.') + '');
          } else {
            aiLoading.hidden = true;
            alert('Erro ao gerar música: ' + (data.error || response.statusText || 'Tente novamente.'));
          }
        } catch (err) {
          console.error(err);
          aiLoading.hidden = true;
          alert('Erro de conexão ao servidor.');
        }
      };

      btnComprar.onclick = async () => {
        if (!currentSong?.songId) {
          alert('Gere uma preview antes de fazer o download.');
          return;
        }
        btnComprar.disabled = true;
        const buyHtml = btnComprar.innerHTML;
        btnComprar.innerHTML = '<span class="music-playground__cta-main music-playground__cta-main--solo">Um instante…</span>';

        try {
          const response = await fetch('/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              plan: 'essencial',
              clientData: {
                nome: 'Cliente Instantâneo',
                email: 'pendente@email.com',
                whatsapp: '00000000',
                ocasiao: 'Geração instantânea',
                estilo: estiloEl.value.trim(),
                historia: historiaEl.value.trim(),
              },
              redirectUrl: window.location.origin + '/sucesso-download.html',
              instantSong: {
                songId: currentSong.songId,
                title: currentSong.title,
              },
            }),
          });

          const data = await response.json();
          if (data.url) {
            window.location.href = data.url;
          } else {
            alert(data.error || 'Erro ao criar sessão de pagamento.');
            btnComprar.disabled = false;
            btnComprar.innerHTML = buyHtml;
          }
        } catch (err) {
          console.error(err);
          alert('Erro ao conectar ao checkout.');
          btnComprar.disabled = false;
          btnComprar.innerHTML = buyHtml;
        }
      };
    })();
  </script>
</body>

</html>
