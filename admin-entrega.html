<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Entrega | Homenagem Musical</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #16120f;
            --clay: #b94f37;
            --teal: #0f766e;
            --sand: #f4efe4;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend Deca', sans-serif;
            background-color: var(--sand);
            color: var(--ink);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .admin-card {
            background: var(--white);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--clay);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        header p {
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--ink);
        }

        input[type="text"], 
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fafafa;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--clay);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(185, 79, 55, 0.1);
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .upload-section {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 2px dashed #eee;
        }

        .upload-section h3 {
            font-size: 1rem;
            margin-bottom: 20px;
            color: var(--ink);
        }

        .song-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }

        input[type="file"] {
            font-size: 0.8rem;
        }

        .btn-generate {
            background: var(--clay);
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }

        .btn-generate:hover {
            background: #a3422e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(185, 79, 55, 0.2);
        }

        .btn-generate:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #resultArea {
            margin-top: 40px;
            padding: 30px;
            background: #f0fdf4;
            border: 2px solid #bcf0da;
            border-radius: 20px;
            text-align: center;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: var(--teal);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        .result-link:hover {
            opacity: 0.9;
        }

        .loading-spinner {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(185, 79, 55, 0.1);
            border-left-color: var(--clay);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <header>
            <h1>Gerador de Entrega</h1>
            <p>Preencha os dados e suba os arquivos para criar a página do cliente.</p>
        </header>
        
        <form id="deliveryForm">
            <div class="form-group">
                <label>Nome do Cliente (para a URL)</label>
                <input type="text" name="clientName" placeholder="Ex: maria-e-joao" required>
            </div>

            <div class="form-group">
                <label>Título da Música</label>
                <input type="text" name="songTitle" placeholder="Ex: Nossa História em Versos" required>
            </div>

            <div class="form-group">
                <label>Letra da Música</label>
                <textarea name="lyrics" placeholder="Cole a letra aqui..." required></textarea>
            </div>

            <div class="upload-section">
                <label>Foto de Capa</label>
                <input type="file" name="photo" accept="image/*" required style="margin-bottom: 20px;">

                <h3>Músicas (suba até 4 versões)</h3>
                <div id="songsList">
                    <div class="song-row">
                        <input type="text" name="songNames" placeholder="Nome (Ex: Versão Principal)" value="Versão Principal">
                        <input type="file" name="songs" accept="audio/*" required>
                    </div>
                    <div class="song-row">
                        <input type="text" name="songNames" placeholder="Nome (Ex: Versão Acústica)">
                        <input type="file" name="songs" accept="audio/*">
                    </div>
                    <div class="song-row">
                        <input type="text" name="songNames" placeholder="Nome (Ex: Versão Instrumental)">
                        <input type="file" name="songs" accept="audio/*">
                    </div>
                    <div class="song-row">
                        <input type="text" name="songNames" placeholder="Nome (Ex: Versão Estendida)">
                        <input type="file" name="songs" accept="audio/*">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-generate" id="submitBtn">Gerar Página de Entrega</button>
            <div class="loading-spinner" id="spinner"></div>
        </form>

        <div id="resultArea">
            <p style="font-weight: 700; color: #166534;">✨ Página gerada com sucesso!</p>
            <p style="font-size: 0.9rem; margin-top: 5px;">O link da entrega é:</p>
            <a href="#" id="deliveryLink" class="result-link" target="_blank">Abrir Página do Cliente</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('deliveryForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const resultArea = document.getElementById('resultArea');
        const deliveryLink = document.getElementById('deliveryLink');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            resultArea.style.display = 'none';

            const formData = new FormData(form);

            try {
                const response = await fetch('/api/generate-delivery', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    deliveryLink.href = data.url;
                    deliveryLink.textContent = window.location.origin + data.url;
                    resultArea.style.display = 'block';
                    form.reset();
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert('Erro: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Erro ao conectar com o servidor.');
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
            }
        };
    </script>
</body>
</html>
